<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu site</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="container">
        <div id="card">
            
            <h2>IMC - Índice de Massa Corporal</h2>
            <table>
                <tr>
                    <th>IMC</th>
                    <th>Resultado</th>
                </tr>
                <tr>
                    <td>Menos do que 18,5</td>
                    <td>Abaixo do peso</td>
                </tr>
                <tr>
                    <td>Entre 18,5 e 24,9</td>
                    <td>Peso normal</td>
                </tr>
                <tr>
                    <td>Entre 25 e 29,9</td>
                    <td>Sobrepeso</td>
                </tr>
                <tr>
                    <td>Entre 30 e 34,9</td>
                    <td>Obesidade grau 1</td>
                </tr>
                <tr>
                    <td>Entre 35 e 39,9</td>
                    <td>Obesidade grau 2</td>
                </tr>
                <tr>
                    <td>Maior do que 40</td>
                    <td>Obesidade grau 3</td>
                </tr>
            </table>
            <h2>Calcule seu IMC:</h2>
            <form action="" id="formulario">

                <label for="peso">Peso</label><br>
                <input type="text" name="peso" id="peso" placeholder="Digite seu peso"><br>

                <label for="altura">Altura</label><br>
                <input type="text" name="altura" id="altura" placeholder="Digite sua altura"><br>

                <button onclick="calcularImc()">Enviar</button>

            </form>
            <div id="resultado"></div>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
