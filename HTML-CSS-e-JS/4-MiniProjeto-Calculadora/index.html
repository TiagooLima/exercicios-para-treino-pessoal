<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
    <link type="image/png" rel="icon" href="img/calculator.ico">
</head>

<body>

    <div id="calculadora">
        <div id="resultado"></div>
        <div id="todosOsBotoes">
            <div class="botoes" onclick="adicionar('1')">1</div>
            <div class="botoes" onclick="adicionar('2')">2</div>
            <div class="botoes" onclick="adicionar('3')">3</div>
            <div class="botoes" onclick="adicionar('+')">+</div>
            <div class="botoes" onclick="adicionar('4')">4</div>
            <div class="botoes" onclick="adicionar('5')">5</div>
            <div class="botoes" onclick="adicionar('6')">6</div>
            <div class="botoes" onclick="adicionar('-')">-</div>
            <div class="botoes" onclick="adicionar('7')">7</div>
            <div class="botoes" onclick="adicionar('8')">8</div>
            <div class="botoes" onclick="adicionar('9')">9</div>
            <div class="botoes" onclick="adicionar('/')">/</div>
            <div class="botoes" onclick="adicionar('0')">0</div>
            <div class="botoes" onclick="adicionar('.')">,</div>
            <div class="botoes" onclick="adicionar('*')">*</div>
            <div class="botoes" onclick="adicionar('**')">^</div>
            <div class="botoes" data="enter" onclick="calcular()">Enter</div>
            <div class="botoes" data="reset" onclick="resetar()">Resetar</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
