<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alcool ou Gasolina?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <div id="card">
            <div id="card_body">
                <h2 class="card_title">Qual o melhor: Álcool ou Gasolina?</h2>
                <form action="" id="card_form">
                    <label for="alcool">Álcool</label>
                    <input type="text" id="alcool" placeholder="Digite o preço: (ex: 5.50)">
                    <br>
                    <label for="gasolina">Gasolina</label>
                    <input type="text" id="gasolina" placeholder="Digite o preço (ex: 5.50)">
                    <br>
                    <button onclick="calcularPreco(alcool.value, gasolina.value);">Calcular</button>
                </form>
                <div id="resultado"></div>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
